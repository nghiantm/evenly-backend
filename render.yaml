services:
  - type: web
    name: evenly-backend
    runtime: python
    plan: free
    buildCommand: pip install -e ".[dev]" && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USER
        sync: false
      - key: PASSWORD
        sync: false
      - key: HOST
        sync: false
      - key: PORT
        sync: false
      - key: DBNAME
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CORS_ORIGINS
        sync: false

services:
  - type: web
    name: evenly-backend
    runtime: python
    buildCommand: pip install -e ".[dev]" && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CORS_ORIGINS
        sync: false
